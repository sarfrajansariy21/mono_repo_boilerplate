version: '3.8'

services:
  # --- Backend API ---
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - NODE_ENV=production
      - DB_URL=${DB_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    restart: always
    networks:
      - backend_net

  # --- Web Frontend ---
  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - APP_NAME=web-service
    restart: always
    networks:
      - backend_net

  # --- Admin Frontend ---
  admin:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - APP_NAME=admin-service
    restart: always
    networks:
      - backend_net

  # --- Reverse Proxy ---
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
      - admin
    restart: always
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge
